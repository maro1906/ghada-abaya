<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIIADA | The Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #261c14;
            --accent-color: #b89c72;
            --bg-color: #fcfbfa;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            padding-top: 120px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(252, 251, 250, 0.98);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(184, 156, 114, 0.15);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 5px;
            color: var(--primary-color);
            text-decoration: none;
        }

        nav a {
            margin-left: 35px;
            text-decoration: none;
            color: var(--primary-color);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .page-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            margin-bottom: 40px;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInDown 1s ease-out;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 0 8% 80px 8%;
            animation: fadeInUp 1s ease-out;
        }

        .product-card {
            background: var(--white);
            border: 1px solid rgba(184, 156, 114, 0.15);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(38, 28, 20, 0.06);
        }

        .img-container {
            width: 100%;
            height: 420px;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover .img-container img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 25px;
            text-align: center;
        }

        .product-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .product-price {
            font-size: 14px;
            color: var(--accent-color);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .shop-now-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .product-card:hover .shop-now-btn {
            background-color: var(--primary-color);
            color: var(--white);
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">GIIADA</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html" style="color: var(--accent-color);">Collection</a>
        </nav>
    </header>

    <h1 class="page-title">The Available Collection</h1>

    <!-- شبكة عرض المنتجات الفاخرة بعد التعديل -->
    <div class="products-grid">
        
        <!-- PRODUCT 1: Velvet Abaya -->
        <div class="product-card">
            <div class="img-container">
                <img src="images/abaya1.jpg" alt="Luxury Velvet Abaya">
            </div>
            <div class="product-info">
                <h3>Aria Abaya</h3>
                <div class="product-price">Price Upon Request</div>
                <!-- لينك الإنستجرام بالرسالة الجاهزة للعباية الملكية -->
                <a href="https://ig.me/m/ghada__egy?text=Hello GHADA, I am inquiring about the Royal Velvet Abaya." target="_blank" class="shop-now-btn">Inquire via Instagram</a>
            </div>
        </div>

        <!-- PRODUCT 2: Silk Abaya -->
        <div class="product-card">
            <div class="img-container">
                <img src="images/abaya2.jpg" alt="Silk Abaya">
            </div>
            <div class="product-info">
                <h3>Cartier Abaya</h3>
                <div class="product-price">Price Upon Request</div>
                <!-- لينك الإنستجرام بالرسالة الجاهزة للعباية الحرير -->

            </div>
        </div>

        <!-- PRODUCT 3: Evening Gown 1 -->
        <div class="product-card">
            <div class="img-container">
                <img src="images/dress1.jpg" alt="Haute Couture Dress">
            </div>
            <div class="product-info">
                <h3>soiree</h3>
                <div class="product-price">Price Upon Request</div>
                <!-- لينك الإنستجرام بالرسالة الجاهزة للفستان الأول -->
                <a href="https://ig.me/m/ghada__egy?text=Hello GHADA, I am inquiring about the Midnight Sequin Gown." target="_blank" class="shop-now-btn">Inquire via Instagram</a>
            </div>

        <!-- PRODUCT 4: Evening Gown 2 -->
        <div class="product-card">
            <div class="img-container">
                <img src="images/dress2.jpg" alt="Luxury Evening Dress">
            </div>
            <div class="product-info">
                <h3>Hazelnut Abaya Double Face</h3>
                <div class="product-price">Price Upon Request</div>
                <!-- لينك الإنستجرام بالرسالة الجاهزة للفستان الثاني -->
                <a href="https://ig.me/m/ghada__egy?text=Hello GHADA, I am inquiring about the Classic Satin Evening Dress." target="_blank" class="shop-now-btn">Inquire via Instagram</a>
            </div>
        </div>

</body>
</html>
