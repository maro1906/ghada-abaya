<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIIADA | Luxury Wear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #261c14; /* Espresso Logo Color */
            --accent-color: #b89c72;  /* Matte Gold */
            --bg-color: #fcfbfa;      /* Silk Off-White */
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            overflow-x: hidden;
            opacity: 0;
            animation: fadeInBody 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.2s;
        }

        /* 1. Preloader Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--primary-color);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slideUpLoader 1.5s cubic-bezier(0.85, 0, 0.15, 1) forwards;
            animation-delay: 1s;
        }

        #loader h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-color);
            font-size: 44px;
            letter-spacing: 9px;
            font-weight: 300;
            opacity: 0;
            animation: fadeInText 0.8s ease forwards;
        }

        /* 2. Floating Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(38,28,20,0.15), transparent);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        header.scrolled {
            background-color: rgba(252, 251, 250, 0.98);
            padding: 15px 8%;
            border-bottom: 1px solid rgba(184, 156, 114, 0.15);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 5px;
            color: var(--white);
            text-decoration: none;
            transition: color 0.4s;
        }

        header.scrolled .logo {
            color: var(--primary-color);
        }

        nav a {
            margin-left: 35px;
            text-decoration: none;
            color: var(--white);
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 400;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 5px;
            transition: color 0.4s;
        }

        header.scrolled nav a {
            color: var(--primary-color);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--accent-color);
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* 3. Hero Section */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transform: scale(1.05);
            animation: zoomOutVideo 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.2s;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(38, 28, 20, 0.4);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 900px;
            color: var(--white);
            transform: translateY(40px);
            opacity: 0;
            animation: fadeInUpContent 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.8s;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1.4;
            letter-spacing: 2px;
        }

        .hero-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid var(--white);
            color: var(--white);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hero-btn:hover {
            color: var(--primary-color);
            background-color: var(--white);
            transform: translateY(-3px);
        }

        /* 4. Split Screen Collections */
        .categories-split {
            display: flex;
            height: 80vh;
            width: 100%;
            background-color: var(--primary-color);
        }

        .split-box {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: flex 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .split-box:hover {
            flex: 1.2;
        }

        .split-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0.6;
        }

        .split-box.evening .split-bg { background-image: url('https://images.unsplash.com/photo-1566174053879-31528523f8ae?q=80&w=1000'); }
        .split-box.abayas .split-bg { background-image: url('https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?q=80&w=1000'); }

        .split-box:hover .split-bg {
            transform: scale(1.08);
            opacity: 0.75;
        }

        .split-content {
            position: relative;
            z-index: 5;
            text-align: center;
            color: var(--white);
        }

        .split-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .split-link {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--white);
            padding-bottom: 5px;
            transition: all 0.3s;
        }

        .split-box:hover .split-link {
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        @keyframes fadeInText { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpLoader { from { transform: translateY(0); } to { transform: translateY(-100%); } }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomOutVideo { from { transform: scale(1.15); } to { transform: scale(1); } }
        @keyframes fadeInUpContent { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader">
        <h2>GIIADA</h2>
    </div>

    <header id="mainHeader">
        <a href="index.html" class="logo">GIIADA</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Collection</a>
        </nav>
    </header>

    <section class="hero">
        <video autoplay loop muted playsinline>
            <source src="videos/video1.mp4" type="video/mp4">
        </video>
        
        <div class="hero-content">
            <h1>Designed For Elegance.<br>Discover GIIADA Luxury Wear.</h1>
            <a href="#explore" class="hero-btn">Explore Collections</a>
        </div>
    </section>

    <section class="categories-split" id="explore">
        <div class="split-box evening" onclick="location.href='shop.html'">
            <div class="split-bg"></div>
            <div class="split-content">
                <h2>Evening Wear</h2>
                <span class="split-link">View Collection</span>
            </div>
        </div>

        <div class="split-box abayas" onclick="location.href='shop.html'">
            <div class="split-bg"></div>
            <div class="split-content">
                <h2>Luxury Abayas</h2>
                <span class="split-link">View Collection</span>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', function() {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>

</body>
</html>
